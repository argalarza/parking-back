services:
  db:
    image: postgres:16
    container_name: parking-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-parking}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./docker/postgres/init/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - parking_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-parking}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  parking_data:
